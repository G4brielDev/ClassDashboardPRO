services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tela_de_sala
      POSTGRES_USER: tela_de_sala
      POSTGRES_PASSWORD: tela_de_sala
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tela_de_sala -d tela_de_sala"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://tela_de_sala:tela_de_sala@db:5432/tela_de_sala
    ports:
      - "8088:3333"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
